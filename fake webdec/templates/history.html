<!DOCTYPE html>
<html>
<head>
    <title>Scan History</title>
    <style>
        body {
            font-family: Arial;
            background: #1e2a38;
            color: white;
            padding: 40px;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        th, td {
            border: 1px solid #444;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #17a2b8;
        }

        .back-btn {
            padding: 10px 20px;
            background: #17a2b8;
            border: none;
            color: white;
            cursor: pointer;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<button class="back-btn" onclick="window.location.href='/'">Back</button>

<h2>Scan History by Category</h2>

{% for category, rows in grouped.items() %}
    <h3>{{ category }}</h3>

    <table>
        <tr>
            <th>ID</th>
            <th>URL</th>
            <th>Score</th>
            <th>Result</th>
        </tr>

        {% for row in rows %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
        </tr>
        {% endfor %}

    </table>
{% endfor %}

</body>
</html>
