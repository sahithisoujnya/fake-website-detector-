<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fake Website Detector</title>

    <style>
        body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
}

.card {
    background: rgba(255, 255, 255, 0.08);
    padding: 35px;
    width: 420px;
    border-radius: 15px;
    backdrop-filter: blur(15px);
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
    text-align: center;
    color: white;
    animation: fadeIn 0.6s ease-in-out;
    

}

h1 {
    margin-bottom: 25px;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 1px;
}


input {
    width: 100%;
    padding: 12px;
    margin-bottom: 18px;
    font-size: 14px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.9);
    border: none;
    outline: none;

}

button {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:first-of-type {
    background: #00c6ff;
    color: white;
}

button:first-of-type:hover {
    background: #0096c7;
}

button:last-of-type {
    background: #555;
    color: white;
}

button:last-of-type:hover {
    background: #777;
}

.result {
    margin-top: 20px;
    padding: 12px;
    border-radius: 10px;
    font-weight: bold;
}

.safe {
    background: rgba(0, 255, 150, 0.2);
    color: #00ffae;
}

.suspicious {
    background: rgba(255, 193, 7, 0.2);
    color: #ffc107;
}

.fake {
    background: rgba(255, 0, 0, 0.2);
    color: #ff4d4d;
}
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}


    </style>
</head>

<body>
    <div class="card">

        <h1>Fake Website Detection</h1>

        <input type="text" id="urlInput" placeholder="Enter website URL" />

        <div style="display:flex; gap:12px; justify-content:center; margin-top:10px;">
            <button onclick="checkWebsite()">Check Website</button>
            <button onclick="resetForm()" style="background:#6c757d;">
                Reset
            </button>
        </div>

        <div id="result" class="result"></div>
        <div id="domainAge" class="result"></div>
        <div id="reasons" class="result"></div>
        <br><br>
<button onclick="window.location.href='/history'" style="background:#17a2b8;">
    View Scan History
</button>

<div id="historyTable" style="margin-top:20px;"></div>


    </div>
</body>


    <script>
    function checkWebsite() {
    const url = document.getElementById("urlInput").value;
    const resultDiv = document.getElementById("result");

    fetch("/check", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ url: url })
    })
    .then(response => response.json())
    .then(data => {
        let className = "safe";

        if (data.result === "Suspicious") className = "suspicious";
        if (data.result === "Fake") className = "fake";

        resultDiv.className = "result " + className;
        resultDiv.innerHTML = `
    Result: ${data.result}<br>
    Score: ${data.score}<br>
    Category: ${data.category}
`;

        const reasonsDiv = document.getElementById("reasons");

if (data.reasons && data.reasons.length > 0) {
    let reasonsHtml = "<strong>Reasons:</strong><ul>";
    data.reasons.forEach(reason => {
        reasonsHtml += `<li>${reason}</li>`;
    });
    reasonsHtml += "</ul>";
    reasonsDiv.innerHTML = reasonsHtml;
} else {
    reasonsDiv.innerHTML = "<strong>Reasons:</strong> None detected";
}


        
        const domainAgeDiv = document.getElementById("domainAge");

if (data.domain_age_years !== null && data.domain_age_years !== undefined) {
    domainAgeDiv.innerText = `Domain Age: ${data.domain_age_years} years`;
} else {
    domainAgeDiv.innerText = "Domain Age: Unknown";
}



    })
    .catch(() => {
        resultDiv.className = "result fake";
        resultDiv.innerHTML = "Error checking website";
    });
}


         
    function resetForm() {
        document.getElementById("urlInput").value = "";
        const resultDiv = document.getElementById("result");
        resultDiv.innerHTML = "";
        resultDiv.className = "result";
    }

    function loadHistory() {
    fetch("/view_scans")
    .then(response => response.json())
    .then(data => {

        let grouped = {};

        // Group by category
        data.forEach(row => {
            let category = row[2] || "Uncategorized";

            if (!grouped[category]) {
                grouped[category] = [];
            }

            grouped[category].push(row);
        });

        let html = "<h3>Scan History by Category</h3>";

        for (let category in grouped) {

            html += `<h4 style="margin-top:20px;">${category}</h4>`;

            html += "<table border='1' style='width:100%; border-collapse:collapse; margin-bottom:20px;'>";

            html += `
                <tr>
                    <th>ID</th>
                    <th>URL</th>
                    <th>Score</th>
                    <th>Result</th>
                </tr>
            `;

            grouped[category].forEach(row => {
                html += `
                    <tr>
                        <td>${row[0]}</td>
                        <td>${row[1]}</td>
                        <td>${row[3]}</td>
                        <td>${row[4]}</td>
                    </tr>
                `;
            });

            html += "</table>";
        }

        document.getElementById("historyTable").innerHTML = html;
    });
}


</script>

</body>
</html>
