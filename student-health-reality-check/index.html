<!DOCTYPE html>
<html>
<head>
  <title>Student Health Reality Check</title>
</head>
<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #e8f5e9, #e3f2fd);
  margin: 0;
  padding: 30px;
}

.container {
  background: #ffffff;
  max-width: 480px;
  margin: auto;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

h1 {
  text-align: center;
  color: #2e7d32;
}

h3 {
  margin-top: 25px;
  color: #37474f;
}

textarea {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #cfd8dc;
  resize: none;
}

select {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #cfd8dc;
}

button {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  background: #43a047;
  color: white;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #388e3c;
}

hr {
  border: none;
  border-top: 1px solid #e0e0e0;
  margin: 25px 0;
}

.note {
  font-size: 14px;
  color: #607d8b;
  text-align: center;
  margin-top: 10px;
}
.result-box {
  margin-top: 15px;
  padding: 12px;
  background: #f1f8e9;
  border-left: 5px solid #4caf50;
  border-radius: 8px;
  color: #2e7d32;
}
label {
  display: block;
  margin: 8px 0;
  font-size: 15px;
  color: #37474f;
}
#timer {
  font-size: 36px;
  font-weight: bold;
  text-align: center;
  color: #1b5e20;
  margin: 10px 0;
}

#calmMsg {
  text-align: center;
  font-style: italic;
  color: #455a64;
}
.container {
  animation: fadeIn 0.6s ease-in;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}









</style>





<body>

  <div class="container">


  <h2>Student Health Reality Check</h2>

  <textarea id="text" rows="5" cols="40"
    placeholder="How are you feeling today?"></textarea><br><br>

  <button onclick="checkHealth()">Check My Health</button>



  <p id="result" class="result-box"></p>

  <hr>

  <h3>Daily Health Quiz</h3>

  Sleep:
  <select id="sleep">
  <option value="">-- Select sleep quality --</option>
  <option value="good">Good</option>
  <option value="ok">Okay</option>
  <option value="poor">Poor</option>
</select>


  Stress:
  <select id="stress">
  <option value="">-- Select stress level --</option>
  <option value="no stress im a GOAT">Low</option>
  <option value="low">Low</option>
  <option value="medium">Medium</option>
  <option value="high">High</option>
  <option value="leave me alonee">Low</option>
</select>

  Energy:
  <select id="energy">
  <option value="">-- Select energy level --</option>
  <option value="majaaa energyyy">Low</option>
  <option value="high">High</option>
  <option value="medium">Medium</option>
  <option value="low">Low</option>
  <option value="ennala mudla pa">Low</option>
</select>

  <button onclick="submitQuiz()">Submit Daily Quiz</button>

  <p id="quizResult" class="result-box"></p>
  <hr>

<h3>Daily Self-Care Checklist 🌱</h3>

<label><input type="checkbox"> Drank enough water 💧</label><br>
<label><input type="checkbox"> Ate a proper meal 🍎</label><br>
<label><input type="checkbox"> Got enough sleep 😴</label><br>
<label><input type="checkbox"> Took a short walk / stretch 🚶</label><br>
<label><input type="checkbox"> Reduced screen time 📵</label><br>

<p class="note">
Small steps matter. You’re doing your best 💙
</p>
<hr>

<h3>2-Minute Calm Break 🧘‍♀️</h3>

<p id="timer">02:00</p>

<button type="button" onclick="startMeditation()">Start Calm Timer</button>




<p id="calmMsg"></p>







<script>
async function checkHealth() {
  const text = document.getElementById("text").value.trim();

  if (text === "") {
    alert("Please tell us how you are feeling today 💙");
    return;
  }

  const res = await fetch("/api/health-check", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ text })
  });

  const data = await res.json();

  document.getElementById("result").innerText =
    `Physical: ${data.physical_status}
Mental: ${data.mental_status}

Message: ${data.message}`;
}



async function submitQuiz() {
  const sleep = document.getElementById("sleep").value;
  const stress = document.getElementById("stress").value;
  const energy = document.getElementById("energy").value;

  if (!sleep || !stress || !energy) {
    alert("Please answer all quiz questions before submitting 🌱");
    return;
  }

  const res = await fetch("/api/daily-quiz", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ sleep, stress, energy })
  });

  const data = await res.json();

  document.getElementById("quizResult").innerText =
    `${data.daily_status} (Score: ${data.score})`;
}

let timeLeft = 120;
let timerInterval = null;

function startMeditation() {
  console.log("Meditation started");

  if (timerInterval) {
    clearInterval(timerInterval);
  }

  timeLeft = 120;

  const timerEl = document.getElementById("timer");
  const msgEl = document.getElementById("calmMsg");

  if (!timerEl || !msgEl) {
    alert("Timer elements not found");
    return;
  }

  msgEl.innerText = "Close your eyes. Breathe in… breathe out…";

  timerInterval = setInterval(() => {
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    timerEl.innerText =
      `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;

    timeLeft--;

    if (timeLeft < 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      timerEl.innerText = "Done 🌿";
      msgEl.innerText = "Well done. Take this calm with you 💙";
    }
  }, 1000);
}







</script>

</div>

</body>
</html>
